<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المساعد الصوتي - Gemini</title>
  <link rel="stylesheet" href="voicebot.css">
</head>
<body>

  <main class="chat-container">
    <header class="chat-header">
      <div class="bot-avatar" aria-hidden="true">🤖</div>
      <div>
        <h1>المساعد الصوتي</h1>
        <p id="statusText">اضغط على الميكروفون وابدأ الحديث</p>
      </div>
    </header>

    <section id="chatLog" class="chat-log" aria-live="polite">
      <div class="message bot">
        <p>مرحبًا! اضغط على زر الميكروفون وتحدّث معي 🎤</p>
      </div>
    </section>

    <div class="chat-input">
      <button id="micBtn" class="mic-btn" type="button" title="اضغط للتحدث" aria-label="بدء التحدث">
        <span id="micIcon">🎤</span>
      </button>
      <p class="hint">يعمل بشكل أفضل على Chrome أو Edge</p>
    </div>
  </main>

  <script src="voicebot.js"></script>
</body>
</html>
